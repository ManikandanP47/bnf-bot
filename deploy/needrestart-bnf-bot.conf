# Prevent apt/needrestart from auto-restarting bnf-bot during market hours.
# Ubuntu security updates (e.g. libsqlite3) otherwise run: systemctl restart bnf-bot
#
# After such upgrades, restart manually after market close:
#   sudo systemctl restart bnf-bot
#
# Installed by: sudo ./deploy/install-needrestart-blacklist.sh

$nrconf{override_rc} = {
    %{ $nrconf{override_rc} },
    qr(^bnf-bot) => 0,
};
